
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Card Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h2 class="text-2xl font-bold mb-6">Card Payment</h2>

<input class="w-full border p-2 mb-3 rounded" placeholder="Card Number">
<input class="w-full border p-2 mb-3 rounded" placeholder="Card Holder Name">

<div class="flex gap-3">
<input class="w-1/2 border p-2 rounded" placeholder="MM/YY">
<input class="w-1/2 border p-2 rounded" placeholder="CVC">
</div>

<button class="w-full bg-indigo-600 text-white py-2 rounded mt-6">Pay Now</button>

</div>

</body>
</html>
