
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Session</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<div class="max-w-xl mx-auto py-20">

<div class="bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-6">Book Learning Session</h2>

<label>Date</label>
<input type="date" class="w-full border p-2 rounded mb-4">

<label>Time</label>
<input type="time" class="w-full border p-2 rounded mb-4">

<textarea class="w-full border p-2 rounded mb-4" placeholder="Message"></textarea>

<button class="w-full bg-indigo-600 text-white py-2 rounded">
Confirm Booking
</button>

</div>
</div>
</body>
</html>
