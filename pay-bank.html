
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bank Transfer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h2 class="text-2xl font-bold mb-6">Bank Transfer</h2>

<select class="w-full border p-2 rounded mb-4">
<option>Select Bank</option>
<option>BCA</option>
<option>Mandiri</option>
<option>BNI</option>
<option>BRI</option>
</select>

<input class="w-full border p-2 rounded mb-4" placeholder="Account Name">

<button class="w-full bg-indigo-600 text-white py-2 rounded">Generate Payment</button>

</div>

</body>
</html>
